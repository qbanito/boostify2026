# 🤝 BOOSTISWAP - 5 EMAIL SEQUENCE
# 
# Automated email campaign to promote BoostiSwap:
# "The artist collaboration network where you swap features"
#
# Usage:
#   - Manual trigger with sequence number selection
#   - Preview mode to test emails before production sends

name: BoostiSwap Sequence (5 Emails)

on:
  workflow_dispatch:
    inputs:
      sequence_number:
        description: 'Sequence Email Number (1-5)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
      max_emails:
        description: 'Maximum number of emails to send (Brevo safe max: 40/run)'
        required: false
        default: '40'
        type: string
      preview_mode:
        description: 'Preview mode (sends to test email only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  schedule:
    # Send sequence emails every Tuesday and Friday at 3pm UTC
    - cron: '0 15 * * 2,5'

jobs:
  send-boostiswap-sequence:
    name: '🤝 BoostiSwap Sequence Email #${{ github.event.inputs.sequence_number || 1 }}'
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install Dependencies
        run: |
          npm install pg resend dotenv

      - name: �️ Pick sequence number for scheduled run
        id: pick_seq
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "seq=${{ github.event.inputs.sequence_number }}" >> $GITHUB_OUTPUT
            echo "max=${{ github.event.inputs.max_emails || '40' }}" >> $GITHUB_OUTPUT
            echo "preview=${{ github.event.inputs.preview_mode || 'false' }}" >> $GITHUB_OUTPUT
          else
            # Auto-rotate sequences 1-5 based on week number
            WEEK=$(date +%V)
            SEQ=$(( (WEEK % 5) + 1 ))
            echo "seq=$SEQ" >> $GITHUB_OUTPUT
            echo "max=40" >> $GITHUB_OUTPUT
            echo "preview=false" >> $GITHUB_OUTPUT
            echo "🗓️ Scheduled run — week $WEEK → sequence #$SEQ"
          fi

      - name: 📧 Send BoostiSwap Sequence Email
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "║   🤝 BOOSTISWAP - EMAIL SEQUENCE                            ║"
          echo "═══════════════════════════════════════════════════════════════"
          echo "📧 Sequence Number: ${{ steps.pick_seq.outputs.seq }}"
          echo "📊 Max Emails: ${{ steps.pick_seq.outputs.max }}"
          echo "🔄 Preview Mode: ${{ steps.pick_seq.outputs.preview }}"
          echo "───────────────────────────────────────────────────────────────"
          
          node scripts/boostiswap-sequence-sender.cjs \
            --sequence=${{ steps.pick_seq.outputs.seq }} \
            --max=${{ steps.pick_seq.outputs.max }} \
            --preview=${{ steps.pick_seq.outputs.preview }}
        env:
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          # Reply-to: convoycubano@gmail.com on all emails (via smart router)
          RESEND_API_ARTISTS_1: ${{ secrets.RESEND_API_ARTISTS_1 }}
          RESEND_API_ARTISTS_2: ${{ secrets.RESEND_API_ARTISTS_2 }}
          RESEND_API_ARTISTS_3: ${{ secrets.RESEND_API_ARTISTS_3 }}
          RESEND_API_ARTISTS_4: ${{ secrets.RESEND_API_ARTISTS_4 }}
          PREVIEW_MODE: ${{ steps.pick_seq.outputs.preview }}

      - name: ✅ Sequence Complete
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "║   ✅ BOOSTISWAP SEQUENCE EMAIL SENT SUCCESSFULLY            ║"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "📧 Email: #${{ steps.pick_seq.outputs.seq }} of 5"
          echo "🤝 Focus: BoostiSwap Artist Collaboration Network"
          echo "🔗 CTA: https://boostifymusic.com/boostiswap"
          echo ""
          echo "📋 Sequence Overview:"
          echo "   1️⃣  The Concept - Swap Features with Artists"
          echo "   2️⃣  How It Works - 3 Simple Steps"
          echo "   3️⃣  The Community - 2,500+ Artists Waiting"
          echo "   4️⃣  Success Stories - Real Collaboration Results"
          echo "   5️⃣  Final Push - FREE Feature Swap Offer"
          echo ""
