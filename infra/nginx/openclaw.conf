upstream openclaw_gateway {
    server 127.0.0.1:18789;
}

server {
    listen 8090;
    server_name localhost;

    # OpenClaw Gateway — only accessible internally
    location /openclaw/ {
        # Require internal authentication token
        if ($http_x_boostify_token = '') {
            return 403;
        }

        proxy_pass http://openclaw_gateway/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=openclaw burst=20 nodelay;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Block all other access to OpenClaw
    location /openclaw/api/admin {
        return 403;
    }
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=openclaw:10m rate=10r/s;
