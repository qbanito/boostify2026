# Render Blueprint Configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: boostify_music
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      # Service role: web process serves the API/frontend. Background cron
      # schedulers are moved OFF the web process to the dedicated
      # `boostify-scheduler` service (set SCHEDULERS_IN_WEB=false). This keeps
      # the web event loop + Neon pool free for user requests under load.
      - key: SERVICE_ROLE
        value: web
      - key: SCHEDULERS_IN_WEB
        value: "false"
      # Optional error monitoring. Leave unset to disable (no-op). Set a real
      # Sentry DSN in the dashboard to capture 5xx + unhandled errors.
      - key: SENTRY_DSN
        sync: false
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Dedicated Stripe webhook secret for the CrowdSync DJ endpoint
      # (/api/crowdsync-dj/webhook). Falls back to STRIPE_WEBHOOK_SECRET when
      # unset. Set the real value in the Render dashboard (Environment tab).
      - key: STRIPE_CROWDSYNC_WEBHOOK_SECRET
        sync: false
      - key: FAL_KEY
        sync: false
      # Tripo3D auto-rigging API (hologram character rig/animation).
      # Set the real key in the Render dashboard (Environment tab).
      - key: TRIPO_API_KEY
        sync: false
      # Meshy rigging API (rigs the existing GLB directly, no regeneration).
      # Set the real key in the Render dashboard (Environment tab).
      - key: MESHY_API_KEY
        sync: false
      # CEX Trading vault — AES-256-GCM key (64-hex) used to encrypt each
      # artist's exchange API keys at rest. MUST match the value used in dev
      # (same Neon DB) or stored keys won't decrypt. Set in Render dashboard.
      - key: CEX_KEY_SECRET
        sync: false
      # Higgsfield Soul image generation (social-media promo posters with
      # artist likeness). Set both in the Render dashboard (Environment tab).
      - key: HIGGSFIELD_API_KEY
        sync: false
      - key: HIGGSFIELD_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: VITE_WALLETCONNECT_PROJECT_ID
        sync: false
      # ──────────────────────────────────────────────────────────────
      # ECONOMIC ENGINE — REAL ON-CHAIN MODE
      # Set TREASURY_WALLET_PRIVATE_KEY in the Render dashboard to
      # switch the engine from simulation to real Polygon operations
      # (Aave V3 lending, Uniswap V3 LP, 1inch arbitrage). Leave empty
      # to keep simulation mode (safe default — no real funds moved).
      # ──────────────────────────────────────────────────────────────
      - key: TREASURY_WALLET_PRIVATE_KEY
        sync: false
      - key: ALCHEMY_API_KEY
        sync: false
      - key: POLYGON_RPC_URL
        sync: false
      - key: BTF_TOKEN_ADDRESS
        sync: false
      - key: ONEINCH_API_KEY
        value: "Sjc51tFglRJw6EsHseREwqBegGFEK0F8"
      # Profit-cascade threshold ($). Defaults to 0.01 in code so even
      # tiny simulated yields surface in the artist profile dashboard.
      - key: ECONOMIC_ENGINE_CASCADE_THRESHOLD
        value: "0.01"
      # ──────────────────────────────────────────────────────────────
      # DURABLE JOB QUEUE (BullMQ + Redis)
      # When REDIS_URL is present, heavy media generation (music videos,
      # campaigns, original-song pipeline…) is enqueued to the `boostify-worker`
      # service instead of running in a fire-and-forget closure that dies on a
      # web redeploy. Leave the keyvalue block below provisioned to enable it;
      # without REDIS_URL the web process keeps running those jobs in-process.
      # ──────────────────────────────────────────────────────────────
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: boostify-redis
          property: connectionString

  # ════════════════════════════════════════════════════════════════════
  # BACKGROUND WORKER — processes the BullMQ `boostify:media` queue.
  # Heavy/long-running jobs survive web redeploys and are auto-retried.
  # ════════════════════════════════════════════════════════════════════
  - type: worker
    name: boostify-worker
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: WORKER_CONCURRENCY
        value: "3"
      - key: SERVICE_ROLE
        value: worker
      - key: SENTRY_DSN
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: boostify-redis
          property: connectionString
      # The worker re-runs the same generation code as the web service, so it
      # needs the same backing-service credentials. Set each in the dashboard.
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: MESHY_API_KEY
        sync: false
      - key: TRIPO_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false

  # ════════════════════════════════════════════════════════════════════
  # SCHEDULER — runs ALL background cron jobs (artist discovery, enrichment,
  # release publisher, music auto-pilot, news, weekly reports, outreach,
  # workflow node triggers…). Same codebase as web (npm start) but with
  # SERVICE_ROLE=scheduler so shouldRunSchedulers() is true here and false on
  # the web service. Keeps cron load off the user-facing web process.
  # ════════════════════════════════════════════════════════════════════
  - type: worker
    name: boostify-scheduler
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PORT
        value: 3000
      # This service IS the scheduler → shouldRunSchedulers() returns true.
      - key: SERVICE_ROLE
        value: scheduler
      - key: SENTRY_DSN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: MESHY_API_KEY
        sync: false
      - key: TRIPO_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: boostify-redis
          property: connectionString

  # ════════════════════════════════════════════════════════════════════
  # REDIS (Key Value) — backs the BullMQ queue. `noeviction` is REQUIRED
  # by BullMQ so queued jobs are never dropped under memory pressure.
  # ════════════════════════════════════════════════════════════════════
  - type: keyvalue
    name: boostify-redis
    region: oregon
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: [] # internal-only (web + worker connect over the private network)

