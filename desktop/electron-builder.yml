# yaml-language-server: $schema=https://raw.githubusercontent.com/electron-userland/electron-builder/master/packages/app-builder-lib/scheme.json

appId: "app.boostify.music"
productName: "Boostify Music"
copyright: "Copyright © 2025 Boostify Music"

directories:
  output: release
  buildResources: resources

files:
  - "dist-electron/**/*"
  - "renderer/**/*"
  - "package.json"

extraMetadata:
  main: dist-electron/main.js

# ─── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: resources/icon.ico
  artifactName: "${productName}-${version}-Setup.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Boostify Music"
  license: ../LICENSE

# ─── macOS ────────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  icon: resources/icon.icns
  category: "public.app-category.music"
  artifactName: "${productName}-${version}-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ─── Linux (future) ──────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: resources/icons
  category: AudioVideo

# ─── Auto-Update ──────────────────────────────────────────────────────────────
publish:
  provider: github
  owner: convoycubano1-glitch
  repo: boostify_music
